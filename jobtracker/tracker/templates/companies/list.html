{% extends "base.html" %}
{% block content %}

<h1>Companies</h1>

<a class="btn" href="{% url 'company_create' %}">Add Company</a>

<table class="table">
    <tr>
        <th>Name</th>
        <th>Industry</th>
        <th>Location</th>
        <th>Actions</th>
    </tr>

    {% for c in companies %}
    <tr>
        <td>{{ c.company_name }}</td>
        <td>{{ c.industry }}</td>
        <td>{{ c.location }}</td>
        <td>
            <a class="edit" href="{% url 'company_update' c.company_id %}">Edit</a>
            <a class="delete" href="{% url 'company_delete' c.company_id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
